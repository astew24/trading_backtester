data:
  symbols:
    - AAPL
    - MSFT
    - GOOG
  benchmark: SPY
  start_date: "2020-01-01"
  end_date:
  interval: 1d
  refresh: false
  cache_dir: data/raw

strategy:
  name: mean_reversion
  moving_average:
    short_window: 20
    long_window: 100
    allow_short: true
  mean_reversion:
    lookback: 20
    entry_zscore: 1.5
    exit_zscore: 0.25
    liquidity_lookback: 20
    min_avg_dollar_volume: 5000000
    allow_short: true

backtest:
  initial_capital: 100000.0
  position_size: 0.95
  max_leverage: 1.0
  commission_bps: 5.0
  fixed_commission: 1.0
  spread_bps: 2.0
  slippage_bps: 1.0
  volatility_target:
  volatility_lookback: 20
  stop_loss: 0.08
  take_profit: 0.15
  trailing_stop: 0.10
  close_positions_on_finish: true

risk:
  risk_free_rate: 0.02

reporting:
  output_dir: artifacts
  save_plots: true
  show_plots: false
  save_trades: true

research:
  train_bars: 252
  test_bars: 63
  step_bars: 63
  metric: Sharpe Ratio
  parameter_grid:
    mean_reversion:
      lookback: [10, 20, 30]
      entry_zscore: [1.0, 1.5, 2.0]
      exit_zscore: [0.25, 0.5]
      allow_short: [true]
    moving_average:
      short_window: [10, 20, 30]
      long_window: [50, 100, 150]
      allow_short: [true]
